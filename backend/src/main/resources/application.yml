server:
  port: 8081

spring:
  application:
    name: task-workflow-backend
  datasource:

    url: jdbc:postgresql://localhost:5432/task_workflow_db?sslmode=disable
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

jwt:
  secret: TaskFlowPortalSecretKey2026MustBeAtLeast512BitsLongForAlgorithmsAndSecurity
  expiration-ms: 86400000